name: Docker Build and Publish

on:
  release:
    types: [ published ]

env:
  IMAGE_NAME: nurefexc/odoo-calendar-sync-caldav

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        run: |
          # Priority: Release Name -> Release Tag
          RAW_VERSION="${{ github.event.release.name }}"
          if [ -z "$RAW_VERSION" ] || [ "$RAW_VERSION" = "null" ]; then
            RAW_VERSION="${{ github.event.release.tag_name }}"
          fi

          # Clean the version string (remove 'refs/tags/' or 'v' prefix)
          CLEAN_VERSION="${RAW_VERSION#refs/tags/}"
          CLEAN_VERSION="${CLEAN_VERSION#v}"

          if [ -z "$CLEAN_VERSION" ]; then
            echo "Error: Could not resolve version from release."
            exit 1
          fi

          echo "tag=v$CLEAN_VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}